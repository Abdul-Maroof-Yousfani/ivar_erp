events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    client_max_body_size 500M;

    resolver 127.0.0.11 valid=30s; # Docker internal DNS

    # -------------------------
    # HTTP Server (port 80)
    # -------------------------
    server {
        listen 80;
        server_name hr.spl.inplsoftwares.com auth.spl.inplsoftwares.com master.spl.inplsoftwares.com pos.spl.inplsoftwares.com erp.spl.inplsoftwares.com admin.spl.inplsoftwares.com;

        # ACME challenge for Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------
    # HTTPS Server (port 443)
    # -------------------------
    server {
        listen 443 ssl http2;
        server_name hr.spl.inplsoftwares.com auth.spl.inplsoftwares.com master.spl.inplsoftwares.com pos.spl.inplsoftwares.com erp.spl.inplsoftwares.com admin.spl.inplsoftwares.com;

        # SSL certs from Let's Encrypt
        ssl_certificate /etc/letsencrypt/live/auth.spl.inplsoftwares.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/auth.spl.inplsoftwares.com/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        # Backend upstream
        set $backend_upstream http://backend:3000;

        location /api/ {
            proxy_pass $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /socket.io/ {
            proxy_pass $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Frontend upstream
        set $frontend_upstream http://frontend:3000;

        location / {
            proxy_pass $frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
